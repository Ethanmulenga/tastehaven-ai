<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TasteHaven Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { light: '#fcfbfa', dark: '#1a1a1a', green: '#2d5a27', accent: '#e27b3a', muted: '#727875' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300..800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .serif-title { font-family: 'Playfair Display', serif; }
        .notification { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .order-card { transition: all 0.3s ease; }
        .order-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50">

    <div id="notification-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-brand-green p-2 rounded-lg">
                    <i data-lucide="utensils-crossed" class="text-white w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold serif-title text-brand-green">TasteHaven</h1>
                    <p class="text-sm text-gray-500">Admin Dashboard</p>
                </div>
            </div>
            <div class="flex items-center space-x-2 bg-green-100 px-3 py-1.5 rounded-full">
                <div class="w-2 h-2 bg-green-600 rounded-full animate-pulse"></div>
                <span class="text-sm font-semibold text-green-700">Live</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                <div class="flex items-center justify-between mb-4">
                    <div class="p-3 bg-blue-100 rounded-xl"><i data-lucide="shopping-bag" class="w-6 h-6 text-blue-600"></i></div>
                    <span class="text-xs font-semibold text-gray-500">Total Orders</span>
                </div>
                <p class="text-3xl font-bold text-gray-800" id="total-orders">0</p>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                <div class="flex items-center justify-between mb-4">
                    <div class="p-3 bg-green-100 rounded-xl"><i data-lucide="dollar-sign" class="w-6 h-6 text-green-600"></i></div>
                    <span class="text-xs font-semibold text-gray-500">Revenue</span>
                </div>
                <p class="text-3xl font-bold text-gray-800" id="total-revenue">$0</p>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                <div class="flex items-center justify-between mb-4">
                    <div class="p-3 bg-amber-100 rounded-xl"><i data-lucide="clock" class="w-6 h-6 text-amber-600"></i></div>
                    <span class="text-xs font-semibold text-gray-500">Pending</span>
                </div>
                <p class="text-3xl font-bold text-gray-800" id="pending-orders">0</p>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                <div class="flex items-center justify-between mb-4">
                    <div class="p-3 bg-purple-100 rounded-xl"><i data-lucide="check-circle" class="w-6 h-6 text-purple-600"></i></div>
                    <span class="text-xs font-semibold text-gray-500">Completed</span>
                </div>
                <p class="text-3xl font-bold text-gray-800" id="completed-orders">0</p>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100">
            <div class="p-6 border-b border-gray-100 flex items-center justify-between">
                <h2 class="text-xl font-bold text-gray-800">Recent Orders</h2>
                <button onclick="loadOrders()" class="flex items-center space-x-2 text-brand-green hover:text-brand-dark transition">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                    <span class="text-sm font-semibold">Refresh</span>
                </button>
            </div>
            <div id="orders-container" class="divide-y divide-gray-100">
                <div class="p-8 text-center text-gray-500">
                    <i data-lucide="loader-2" class="w-8 h-8 animate-spin mx-auto mb-3"></i>
                    <p>Loading orders...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const socket = io();

        socket.on('new_order', (order) => { showNotification(order); loadOrders(); loadAnalytics(); });
        socket.on('order_status_updated', () => { loadOrders(); loadAnalytics(); });

        function showNotification(order) {
            const container = document.getElementById('notification-container');
            const notification = document.createElement('div');
            notification.className = 'notification bg-white rounded-xl shadow-lg border-l-4 border-brand-green p-4 max-w-sm';
            notification.innerHTML = `
                <div class="flex items-start space-x-3">
                    <div class="p-2 bg-green-100 rounded-lg"><i data-lucide="shopping-bag" class="w-5 h-5 text-brand-green"></i></div>
                    <div class="flex-1">
                        <h4 class="font-bold text-gray-800">New Order Received!</h4>
                        <p class="text-sm text-gray-600">Order #${order.orderId}</p>
                        <p class="text-sm font-semibold text-brand-green">$${order.totalAmount.toFixed(2)}</p>
                    </div>
                </div>`;
            container.appendChild(notification);
            lucide.createIcons();
            setTimeout(() => notification.remove(), 5000);
        }

        // Helper to mask phone numbers for privacy since dashboard is public
        function maskPhone(phone) {
            if (!phone) return 'N/A';
            if (phone.length <= 5) return phone;
            // Show the first part of the number, but mask the last 5 digits for security
            return phone.substring(0, phone.length - 5) + '*****';
        }

        async function loadOrders() {
            try {
                const response = await fetch('/api/admin/orders');
                const data = await response.json();
                const container = document.getElementById('orders-container');
                
                if (data.orders.length === 0) {
                    container.innerHTML = `<div class="p-8 text-center text-gray-500"><i data-lucide="inbox" class="w-12 h-12 mx-auto mb-3 opacity-50"></i><p>No orders yet</p></div>`;
                    lucide.createIcons();
                    return;
                }

                container.innerHTML = data.orders.map(order => `
                    <div class="order-card p-6 hover:bg-gray-50">
                        <div class="flex items-start justify-between mb-4">
                            <div>
                                <div class="flex items-center space-x-3 mb-1">
                                    <span class="text-lg font-bold text-gray-800">#${order.orderId}</span>
                                    <span class="px-3 py-1 rounded-full text-xs font-semibold ${getStatusColor(order.status)}">${order.status}</span>
                                </div>
                                <p class="text-sm text-gray-600">${order.guestName} • ${maskPhone(order.guestPhone)}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-2xl font-bold text-brand-green">$${order.totalAmount.toFixed(2)}</p>
                                <p class="text-xs text-gray-500">${new Date(order.createdAt).toLocaleString()}</p>
                            </div>
                        </div>
                        <div class="bg-gray-50 rounded-xl p-4 mb-4">
                            <h4 class="text-sm font-semibold text-gray-700 mb-2">Items:</h4>
                            <div class="space-y-1">
                                ${order.items.map(item => `<div class="flex justify-between text-sm"><span class="text-gray-600">${item.quantity}x ${item.name}</span><span class="text-gray-800">$${(item.price * item.quantity).toFixed(2)}</span></div>`).join('')}
                            </div>
                        </div>
                        <div class="flex space-x-2">
                            ${order.status === 'Pending' ? `<button onclick="updateOrderStatus('${order.orderId}', 'Preparing')" class="flex-1 bg-brand-green text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-brand-dark transition">Mark as Preparing</button>` : ''}
                            ${order.status === 'Preparing' ? `<button onclick="updateOrderStatus('${order.orderId}', 'Ready')" class="flex-1 bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-blue-700 transition">Mark as Ready</button>` : ''}
                            ${order.status === 'Ready' ? `<button onclick="updateOrderStatus('${order.orderId}', 'Completed')" class="flex-1 bg-purple-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-purple-700 transition">Mark as Completed</button>` : ''}
                            ${order.status === 'Completed' ? `<span class="flex-1 text-center text-gray-500 text-sm py-2">Order Completed ✓</span>` : ''}
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (error) { console.error('Error loading orders:', error); }
        }

        async function loadAnalytics() {
            try {
                const response = await fetch('/api/admin/analytics');
                const data = await response.json();
                if (data.success) {
                    document.getElementById('total-orders').textContent = data.analytics.totalOrders;
                    document.getElementById('total-revenue').textContent = `$${data.analytics.totalRevenue.toFixed(2)}`;
                    document.getElementById('pending-orders').textContent = data.analytics.pendingOrders;
                    document.getElementById('completed-orders').textContent = data.analytics.completedOrders;
                }
            } catch (error) { console.error('Error loading analytics:', error); }
        }

        async function updateOrderStatus(orderId, status) {
            try {
                const response = await fetch(`/api/admin/orders/${orderId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                if ((await response.json()).success) { loadOrders(); loadAnalytics(); }
            } catch (error) { console.error('Error updating order:', error); }
        }

        function getStatusColor(status) {
            const colors = { 'Pending': 'bg-amber-100 text-amber-700', 'Preparing': 'bg-blue-100 text-blue-700', 'Ready': 'bg-purple-100 text-purple-700', 'Completed': 'bg-green-100 text-green-700' };
            return colors[status] || 'bg-gray-100 text-gray-700';
        }

        loadOrders();
        loadAnalytics();
        setInterval(() => { loadOrders(); loadAnalytics(); }, 30000);
    </script>
</body>
</html>
